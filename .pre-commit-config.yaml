# Optional. Installing pre-commit hooks downloads hook environments.
# Run only after you intentionally approve that setup step:
#   pipx install pre-commit
#   pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
